{% extends "base.html" %}

{% block title %}Delete Avatar - Chinook Music Database{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">
                    <i class="fas fa-exclamation-triangle me-2"></i>Delete Avatar
                </h4>
            </div>
            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    {% if user_profile.avatar %}
                        <img src="{{ user_profile.avatar.url }}" 
                             alt="{{ user.username }}" 
                             class="img-thumbnail rounded-circle mb-3"
                             style="width: 120px; height: 120px; object-fit: cover;">
                    {% endif %}
                    <h5>Are you sure you want to delete your avatar?</h5>
                    <p class="text-muted">This action cannot be undone.</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary me-md-2">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-1"></i>Yes, Delete Avatar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
